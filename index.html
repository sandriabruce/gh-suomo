    <script>
      (function () {
        var legacyKey = "spicy-mode:active:v1";
        var key = "spicy_mode";
        var active = false;
        try {
          active =
            window.localStorage.getItem(key) === "true" ||
            window.localStorage.getItem(legacyKey) === "1";
          if (active) {
            // Mirror to the canonical key so future reads agree.
            window.localStorage.setItem(key, "true");
            window.localStorage.setItem(legacyKey, "1");
          }
        } catch (error) {
          return;
        }
        if (!active) return;

        document.documentElement.style.setProperty("--background", "0 85% 8%");
        document.documentElement.style.setProperty("--card", "0 75% 14%");

        document.documentElement.style.setProperty("--foreground", "30 60% 92%");

        document.documentElement.classList.add("spicy-mode");

        var css = "html.spicy-mode body{background:linear-gradient(135deg,#3D0000 0%,#5C0000 50%,#3D0000 100%)!important;background-color:#3D0000!important;min-height:100vh!important;color:#F5E6D3!important}html.spicy-mode #root{min-height:100vh!important;background:transparent!important}html.spicy-mode div[class*='bg-background'],html.spicy-mode main[class*='bg-background']{background-color:#3D0000!important}html.spicy-mode [class*='bg-card']{background-color:#5C0000!important}html.spicy-mode [class*='bg-muted']{background-color:#5C0000!important}html.spicy-mode [class*='text-foreground']{color:#F5E6D3!important}html.spicy-mode [class*='text-primary']{color:#C9A84C!important}html.spicy-mode [class*='border-border']{border-color:#8B0000!important}";
        var style = document.getElementById("spicy-mode-runtime-theme");
        if (!style) {
          style = document.createElement("style");
          style.id = "spicy-mode-runtime-theme";
          style.setAttribute("data-version", "spicy-crimson-20260521");
          document.head.appendChild(style);
        }
        style.textContent = css;

        function paintBody() {
          if (!document.body) return;
          document.body.style.cssText =
            "background: linear-gradient(135deg, #3D0000 0%, #5C0000 50%, #3D0000 100%) !important; background-color: #3D0000 !important; min-height: 100vh;";
        }
        if (document.body) paintBody();
        else document.addEventListener("DOMContentLoaded", paintBody, { once: true });
      })();
    </script>
    <div id="root"></div>
    <script>
      // Register service worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js?v=4').then(function(reg) {
            console.log('SW registered');
          }).catch(function(err) {
            console.log('SW failed:', err);
          });
        });
      }

      // Detect device and browser
      var isInStandaloneMode = ('standalone' in window.navigator) && window.navigator.standalone;
      var isSafari = /safari/i.test(navigator.userAgent) && !/chrome|crios|fxios|android/i.test(navigator.userAgent);
      var isAndroid = /android/i.test(navigator.userAgent);
      var isMIUI = /miuibrowser|xiaomi/i.test(navigator.userAgent);
      var isChrome = /chrome|crios/i.test(navigator.userAgent) && !/edge/i.test(navigator.userAgent);
      var isInstalled = window.matchMedia('(display-mode: standalone)').matches || isInStandaloneMode;

      function showBanner(html) {
        // Reset dismissed flag after 7 days so banner can show again
        var dismissedAt = localStorage.getItem('pwa-dismissed-at');
        if (dismissedAt && (Date.now() - parseInt(dismissedAt)) > 7 * 24 * 60 * 60 * 1000) {
          localStorage.removeItem('pwa-dismissed');
          localStorage.removeItem('pwa-dismissed-at');
        }
        if (localStorage.getItem('pwa-dismissed') || isInstalled) return;
        document.addEventListener('DOMContentLoaded', function() {
          if (document.getElementById('pwa-banner')) return;
          var banner = document.createElement('div');
          banner.id = 'pwa-banner';
          banner.innerHTML = html;
          document.body.appendChild(banner);
        });
      }

      // iOS Safari — manual instructions
      if (isIOS && isSafari && !isInstalled) {
        showBanner('<div style="position:fixed;bottom:0;left:0;right:0;background:#1a0a00;border-top:2px solid #C9A84C;padding:16px;z-index:9999;display:flex;align-items:center;justify-content:space-between;box-shadow:0 -4px 20px rgba(0,0,0,0.5);"><div style="color:#F5E6D3;font-size:13px;flex:1;margin-right:12px;line-height:1.5;"><strong style="color:#C9A84C;">Install GH Suɔmɔ</strong><br>Tap <strong style="color:#C9A84C;">Share \u2197</strong> then <strong style="color:#C9A84C;">Add to Home Screen</strong></div><button onclick="document.getElementById(\'pwa-banner\').remove();localStorage.setItem(\'pwa-dismissed\',\'1\')" style="background:transparent;color:#F5E6D3;border:1px solid #C9A84C;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;white-space:nowrap;">Got it</button></div>');
      }

      // MIUI browser — show manual instructions since beforeinstallprompt unreliable
      if (isAndroid && isMIUI && !isInstalled) {
        showBanner('<div style="position:fixed;bottom:0;left:0;right:0;background:#1a0a00;border-top:2px solid #C9A84C;padding:16px;z-index:9999;display:flex;align-items:center;justify-content:space-between;box-shadow:0 -4px 20px rgba(0,0,0,0.5);"><div style="color:#F5E6D3;font-size:13px;flex:1;margin-right:12px;line-height:1.5;"><strong style="color:#C9A84C;">Install GH Suɔmɔ</strong><br>Tap the <strong style="color:#C9A84C;">menu (\u22EE)</strong> then <strong style="color:#C9A84C;">Add to Home Screen</strong></div><button onclick="document.getElementById(\'pwa-banner\').remove();localStorage.setItem(\'pwa-dismissed\',\'1\')" style="background:transparent;color:#F5E6D3;border:1px solid #C9A84C;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;white-space:nowrap;">Got it</button></div>');
      }

      // Android Chrome — use native beforeinstallprompt
      var deferredPrompt;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        deferredPrompt = e;
        if (!localStorage.getItem('pwa-dismissed') && !isInstalled) {
          showBanner('<div style="position:fixed;bottom:80px;left:16px;right:16px;background:#1a0a00;border:1px solid #C9A84C;border-radius:12px;padding:16px;z-index:9999;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(0,0,0,0.5);"><div style="color:#F5E6D3;font-size:14px;flex:1;margin-right:12px;"><strong style="color:#C9A84C;">Install GH Suɔmɔ</strong><br><span style="font-size:12px;">Add to your home screen for the best experience</span></div><button onclick="window.installApp()" style="background:#C9A84C;color:#1a0a00;border:none;padding:8px 14px;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px;margin-right:8px;">Install</button><button onclick="document.getElementById(\'pwa-banner\').remove();localStorage.setItem(\'pwa-dismissed\',\'1\')" style="background:transparent;color:#F5E6D3;border:none;font-size:22px;cursor:pointer;padding:2px 6px;">\u00D7</button></div>');
        }
      });

      window.installApp = function() {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(function(result) {
            if (result.outcome === 'accepted') {
              var b = document.getElementById('pwa-banner');
              if (b) b.remove();
              localStorage.setItem('pwa-dismissed', '1');
            }
            deferredPrompt = null;
          });
        }
      };
    </script>
