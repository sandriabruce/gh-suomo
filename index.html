    <script>
      (function () {
        var legacyKey = "spicy-mode:active:v1";
        var key = "spicy_mode";
        var active = false;
        try {
          active =
            window.localStorage.getItem(key) === "true" ||
            window.localStorage.getItem(legacyKey) === "1";
          if (active) {
            // Mirror to the canonical key so future reads agree.
            window.localStorage.setItem(key, "true");
            window.localStorage.setItem(legacyKey, "1");
          }
        } catch (error) {
          return;
        }
        if (!active) return;

        document.documentElement.style.setProperty("--background", "#1A0000");
        document.documentElement.style.setProperty("--card", "#2D0A0A");
        document.documentElement.style.setProperty("--primary", "#C9A84C");
        document.documentElement.style.setProperty("--foreground", "#F5E6D3");
        document.documentElement.style.setProperty("--border", "#8B0000");
        document.documentElement.classList.add("spicy-mode");

        var css = "html.spicy-mode,html.spicy-mode body{transition:background 0.8s ease,color 0.8s ease!important}html.spicy-mode{--background:#1A0000!important;--card:#2D0A0A!important;--primary:#C9A84C!important;--foreground:#F5E6D3!important;--border:#8B0000!important}html.spicy-mode body{background:linear-gradient(135deg,#1A0000 0%,#2D0000 100%)!important;min-height:100vh!important;color:#F5E6D3!important}html.spicy-mode #root{min-height:100vh!important;background:transparent!important}html.spicy-mode .bg-background,html.spicy-mode [class*=\"bg-background\"]{background-color:#1A0000!important}html.spicy-mode .bg-card,html.spicy-mode [class*=\"bg-card\"]{background-color:#2D0A0A!important}html.spicy-mode .bg-primary,html.spicy-mode [class*=\"bg-primary\"]{background-color:#C9A84C!important}html.spicy-mode .text-foreground,html.spicy-mode [class*=\"text-foreground\"]{color:#F5E6D3!important}html.spicy-mode .text-primary,html.spicy-mode [class*=\"text-primary\"]{color:#C9A84C!important}html.spicy-mode .border-border,html.spicy-mode [class*=\"border-border\"]{border-color:#8B0000!important}";
        var style = document.getElementById("spicy-mode-runtime-theme");
        if (!style) {
          style = document.createElement("style");
          style.id = "spicy-mode-runtime-theme";
          style.setAttribute("data-version", "spicy-crimson-20260521");
          document.head.appendChild(style);
        }
        style.textContent = css;

        function paintBody() {
          if (!document.body) return;
          document.body.style.cssText =
            "background: linear-gradient(135deg, #1A0000 0%, #2D0000 100%) !important; min-height: 100vh;";
        }
        if (document.body) paintBody();
        else document.addEventListener("DOMContentLoaded", paintBody, { once: true });
      })();
    </script>
    <div id="root"></div>
    <script>
      // Register service worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').then(function(reg) {
            console.log('SW registered');
          }).catch(function(err) {
            console.log('SW failed:', err);
          });
        });
      }

      // PWA install prompt
      var deferredPrompt;
      var installBanner = null;

      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        deferredPrompt = e;
        if (!localStorage.getItem('pwa-dismissed')) {
          showInstallBanner();
        }
      });

      function showInstallBanner() {
        installBanner = document.createElement('div');
        installBanner.id = 'pwa-banner';
        installBanner.style.cssText = 'position:fixed;bottom:80px;left:16px;right:16px;background:#1a0a00;border:1px solid #C9A84C;border-radius:12px;padding:16px;z-index:9999;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(0,0,0,0.5);';
        installBanner.innerHTML = '<div style="color:#F5E6D3;font-size:14px;flex:1;margin-right:12px;"><strong style="color:#C9A84C;">Install GH Suɔmɔ</strong><br>Add to your home screen for the best experience</div><button onclick="installApp()" style="background:#C9A84C;color:#1a0a00;border:none;padding:8px 16px;border-radius:8px;font-weight:700;cursor:pointer;margin-right:8px;">Install</button><button onclick="dismissBanner()" style="background:transparent;color:#F5E6D3;border:none;font-size:20px;cursor:pointer;padding:4px;">×</button>';
        document.body.appendChild(installBanner);
      }

      window.installApp = function() {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(function(result) {
            if (result.outcome === 'accepted') {
              dismissBanner();
            }
            deferredPrompt = null;
          });
        }
      };

      window.dismissBanner = function() {
        if (installBanner) {
          installBanner.remove();
          localStorage.setItem('pwa-dismissed', '1');
        }
      };
    </script>
