[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# API routes — must come BEFORE the SPA catch-all
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA catch-all — last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
